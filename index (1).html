<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping List</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ===================== TOKENS ===================== */
    :root {
      --cream:      #F7F3EC;
      --cream-dark: #EDE7DA;
      --ink:        #1C1A17;
      --ink-light:  #6B6560;
      --ink-faint:  #B5AFA8;
      --accent:     #C4622D;
      --accent-soft:#F0DDD2;
      --green:      #3A7D5A;
      --green-soft: #D4EAE0;
      --shadow:     rgba(28,26,23,0.08);
      --radius:     12px;
      --radius-sm:  7px;
    }

    /* ===================== RESET ===================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      padding: 0 0 120px;
    }

    /* ===================== HEADER ===================== */
    header {
      background: var(--ink);
      color: var(--cream);
      padding: 28px 24px 22px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px var(--shadow);
    }

    header h1 {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 28px;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    header h1 span {
      font-style: italic;
      color: var(--accent);
    }

    /* ===================== ADD FORM ===================== */
    .add-form {
      display: flex;
      gap: 8px;
      position: relative;
    }

    .input-wrap {
      position: relative;
      flex: 1;
    }

    #itemInput {
      width: 100%;
      padding: 12px 16px;
      background: rgba(247,243,236,0.12);
      border: 1.5px solid rgba(247,243,236,0.2);
      border-radius: var(--radius-sm);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    #itemInput::placeholder { color: rgba(247,243,236,0.4); }
    #itemInput:focus { border-color: var(--accent); }

    /* Category suggestion pill */
    #catSuggest {
      display: none;
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
      pointer-events: none;
      white-space: nowrap;
    }

    .cat-select {
      padding: 12px 10px;
      background: rgba(247,243,236,0.1);
      border: 1.5px solid rgba(247,243,236,0.2);
      border-radius: var(--radius-sm);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .cat-select:focus { border-color: var(--accent); }
    .cat-select option { background: var(--ink); color: var(--cream); }

    .add-btn {
      padding: 12px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .add-btn:hover  { background: #b05526; }
    .add-btn:active { transform: scale(0.97); }
    .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===================== CONTENT ===================== */
    main { padding: 24px 20px; max-width: 640px; margin: 0 auto; }

    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      color: var(--ink-light);
      font-size: 13px;
    }

    .item-count { font-weight: 500; }
    .item-count strong { color: var(--accent); }

    /* ===================== CATEGORY GROUPS ===================== */
    .category-group {
      margin-bottom: 20px;
      background: white;
      border-radius: var(--radius);
      box-shadow: 0 1px 8px var(--shadow);
      overflow: hidden;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--cream-dark);
      border-bottom: 1px solid rgba(28,26,23,0.07);
    }

    .category-icon { font-size: 18px; }

    .category-name {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: 15px;
      color: var(--ink);
      flex: 1;
    }

    .category-count {
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-faint);
      background: rgba(28,26,23,0.07);
      padding: 2px 7px;
      border-radius: 20px;
    }

    /* ===================== ITEMS ===================== */
    .item-row {
      display: flex;
      align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid rgba(28,26,23,0.05);
      gap: 12px;
      transition: background 0.15s;
    }

    .item-row:last-child { border-bottom: none; }
    .item-row:hover { background: #fafaf8; }

    .item-row.checked { background: #f9f9f7; }

    /* Custom checkbox */
    .check-wrap {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      position: relative;
    }

    .check-wrap input[type="checkbox"] {
      appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid var(--ink-faint);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
    }

    .check-wrap input[type="checkbox"]:checked {
      background: var(--green);
      border-color: var(--green);
    }

    .check-wrap input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 2px;
      width: 7px;
      height: 11px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .item-name {
      flex: 1;
      font-size: 15px;
      color: var(--ink);
      transition: all 0.2s;
    }

    .item-row.checked .item-name {
      color: var(--ink-faint);
      text-decoration: line-through;
    }

    .delete-btn {
      opacity: 0;
      background: none;
      border: none;
      color: var(--ink-faint);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: opacity 0.15s, color 0.15s;
    }

    .item-row:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--accent); }

    /* ===================== EMPTY STATE ===================== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-faint);
    }

    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }

    .empty-state p {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-style: italic;
      margin-bottom: 6px;
      color: var(--ink-light);
    }

    .empty-state span { font-size: 13px; }

    /* ===================== COMPLETE TRIP BUTTON ===================== */
    .complete-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 16px 20px;
      background: linear-gradient(transparent, var(--cream) 30%);
      display: flex;
      justify-content: center;
    }

    .complete-btn {
      padding: 14px 36px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(58,125,90,0.35);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      display: none;
    }

    .complete-btn:hover {
      background: #2f6849;
      box-shadow: 0 6px 24px rgba(58,125,90,0.45);
    }

    .complete-btn:active { transform: scale(0.97); }
    .complete-btn.visible { display: block; animation: popUp 0.3s ease; }

    @keyframes popUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===================== LOADING / TOAST ===================== */
    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(247,243,236,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: var(--cream);
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===================== CONFIG OVERLAY ===================== */
    .config-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(247,243,236,0.1);
      border: 1px solid rgba(247,243,236,0.2);
      color: var(--cream);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      z-index: 200;
      transition: background 0.2s;
    }
    .config-btn:hover { background: rgba(247,243,236,0.2); }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(28,26,23,0.6);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    .overlay.show { display: flex; }

    .overlay-box {
      background: white;
      border-radius: var(--radius);
      padding: 28px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 16px 48px rgba(28,26,23,0.2);
    }

    .overlay-box h2 {
      font-family: 'Fraunces', serif;
      font-weight: 500;
      font-size: 20px;
      margin-bottom: 8px;
    }

    .overlay-box p {
      font-size: 13px;
      color: var(--ink-light);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .overlay-box input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--cream-dark);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      color: var(--ink);
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .overlay-box input:focus { border-color: var(--accent); }

    .overlay-btns { display: flex; gap: 8px; justify-content: flex-end; }

    .btn-cancel {
      padding: 10px 18px;
      background: var(--cream-dark);
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      color: var(--ink-light);
    }

    .btn-save {
      padding: 10px 18px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Config button -->
  <button class="config-btn" onclick="openConfig()">⚙ Setup</button>

  <!-- Header -->
  <header>
    <h1>Shopping <span>List</span></h1>
    <div class="add-form">
      <div class="input-wrap">
        <input
          id="itemInput"
          type="text"
          placeholder="Add an item..."
          autocomplete="off"
          onkeydown="if(event.key==='Enter') addItem()"
          oninput="detectCategory()"
        />
        <span id="catSuggest"></span>
      </div>
      <select id="catSelect" class="cat-select">
        <option value="">Auto</option>
        <option value="Produce">🥦 Produce</option>
        <option value="Dairy">🧀 Dairy</option>
        <option value="Meat & Seafood">🥩 Meat</option>
        <option value="Bread & Bakery">🍞 Bread</option>
        <option value="Frozen">🧊 Frozen</option>
        <option value="Pantry">🥫 Pantry</option>
        <option value="Snacks">🍿 Snacks</option>
        <option value="Beverages">🧃 Beverages</option>
        <option value="Household">🧴 Household</option>
        <option value="Personal Care">🪥 Personal</option>
        <option value="Baby & Kids">🧸 Baby</option>
        <option value="Other">📦 Other</option>
      </select>
      <button class="add-btn" id="addBtn" onclick="addItem()">Add</button>
    </div>
  </header>

  <!-- Main list -->
  <main>
    <div class="status-bar">
      <span class="item-count" id="itemCount">Loading...</span>
    </div>
    <div id="listContainer"></div>
  </main>

  <!-- Complete trip button -->
  <div class="complete-wrap">
    <button class="complete-btn" id="completeBtn" onclick="completeTrip()">
      ✓ Complete Shopping Trip
    </button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Config overlay -->
  <div class="overlay" id="configOverlay">
    <div class="overlay-box">
      <h2>Script URL Setup</h2>
      <p>Paste your Google Apps Script deployment URL below. You'll get this after deploying your Apps Script as a Web App.</p>
      <input type="text" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/.../exec" />
      <div class="overlay-btns">
        <button class="btn-cancel" onclick="closeConfig()">Cancel</button>
        <button class="btn-save" onclick="saveConfig()">Save & Connect</button>
      </div>
    </div>
  </div>

<script>
// ===================== CONFIG =====================
let SCRIPT_URL = localStorage.getItem("shoppingScriptUrl") || "";
let detectedCategory = "";

// ===================== CATEGORY DETECTION =====================
const categoryMap = {
  "Produce":        ["apple","apples","banana","bananas","orange","oranges","grape","grapes","strawberry","strawberries","blueberry","blueberries","lettuce","spinach","kale","arugula","broccoli","cauliflower","carrot","carrots","celery","cucumber","tomato","tomatoes","avocado","avocados","onion","onions","garlic","potato","potatoes","sweet potato","yam","zucchini","squash","pepper","peppers","mushroom","mushrooms","lemon","lemons","lime","limes","mango","peach","peaches","pear","pears","plum","plums","watermelon","melon","pineapple","corn","asparagus","green beans","snap peas","peas","beet","beets","radish","cabbage","brussels","ginger","herbs","basil","cilantro","parsley","mint","thyme","rosemary","chive","chives","scallion","scallions"],
  "Dairy":          ["milk","whole milk","skim milk","almond milk","oat milk","soy milk","cheese","cheddar","mozzarella","parmesan","brie","swiss","gouda","feta","cream cheese","cottage cheese","ricotta","butter","margarine","cream","heavy cream","sour cream","yogurt","greek yogurt","kefir","whipped cream","half and half","eggs","egg","ice cream"],
  "Meat & Seafood": ["chicken","beef","pork","turkey","lamb","veal","bacon","ham","sausage","salami","pepperoni","hot dog","hot dogs","bratwurst","steak","ground beef","ground turkey","ribs","roast","chops","filet","salmon","tuna","shrimp","cod","tilapia","halibut","crab","lobster","scallops","clams","oysters","anchovies","sardines","deli meat","lunchmeat","prosciutto"],
  "Bread & Bakery": ["bread","sourdough","baguette","roll","rolls","bagel","bagels","croissant","muffin","muffins","english muffin","pita","tortilla","tortillas","naan","wrap","wraps","bun","buns","hot dog bun","hamburger bun","toast","flatbread","cracker","crackers","cake","cupcake","donut","pastry","pie crust"],
  "Frozen":         ["frozen","ice cream","pizza","frozen pizza","frozen vegetables","frozen fruit","frozen meal","frozen burrito","waffles","waffle","pancakes","fries","tater tots","frozen yogurt","edamame","ice","popsicle","popsicles","gelato","sorbet"],
  "Pantry":         ["rice","pasta","noodles","spaghetti","penne","flour","sugar","salt","pepper","oil","olive oil","vegetable oil","coconut oil","vinegar","sauce","tomato sauce","pasta sauce","ketchup","mustard","mayonnaise","mayo","relish","soy sauce","hot sauce","salsa","hummus","peanut butter","almond butter","jelly","jam","honey","maple syrup","syrup","canned","beans","black beans","chickpeas","lentils","soup","broth","stock","cereal","oats","oatmeal","granola","pancake mix","baking powder","baking soda","vanilla","spice","spices","seasoning","dressing","ranch","vinaigrette","chips","crackers","nuts","almonds","walnuts","cashews","seeds","chia","flax","quinoa","couscous","breadcrumbs","panko"],
  "Snacks":         ["chips","popcorn","pretzels","crackers","granola bar","protein bar","candy","chocolate","gummy","cookies","oreos","trail mix","jerky","dried fruit","raisins","fruit snacks","rice cake","pork rinds"],
  "Beverages":      ["water","sparkling water","soda","coke","pepsi","sprite","juice","orange juice","apple juice","coffee","espresso","tea","green tea","lemonade","sports drink","gatorade","energy drink","beer","wine","kombucha","coconut water","milk"],
  "Household":      ["paper towel","paper towels","toilet paper","tissues","napkins","foil","aluminum foil","plastic wrap","ziploc","ziplock","trash bag","trash bags","dish soap","laundry detergent","detergent","bleach","cleaner","cleaning","sponge","mop","broom","vacuum","candle","batteries","lightbulb","light bulb","zip ties","tape","glue","bag","bags"],
  "Personal Care":  ["shampoo","conditioner","soap","body wash","toothpaste","toothbrush","floss","mouthwash","deodorant","lotion","moisturizer","sunscreen","razor","shaving cream","cotton swab","cotton ball","bandaid","band-aid","ibuprofen","advil","tylenol","vitamin","vitamins","supplement","feminine","tampon","pad","makeup","lipstick","mascara","foundation","perfume","cologne"],
  "Baby & Kids":    ["diapers","diaper","wipes","formula","baby food","pacifier","baby wash","baby shampoo","baby lotion"]
};

const categoryIcons = {
  "Produce":        "🥦",
  "Dairy":          "🧀",
  "Meat & Seafood": "🥩",
  "Bread & Bakery": "🍞",
  "Frozen":         "🧊",
  "Pantry":         "🥫",
  "Snacks":         "🍿",
  "Beverages":      "🧃",
  "Household":      "🧴",
  "Personal Care":  "🪥",
  "Baby & Kids":    "🧸",
  "Other":          "📦"
};

const categoryOrder = ["Produce","Dairy","Meat & Seafood","Bread & Bakery","Frozen","Pantry","Snacks","Beverages","Household","Personal Care","Baby & Kids","Other"];

function detectCategory() {
  const val = document.getElementById("itemInput").value.toLowerCase().trim();
  const suggest = document.getElementById("catSuggest");
  const catSelect = document.getElementById("catSelect");

  if (!val || catSelect.value !== "") {
    suggest.style.display = "none";
    detectedCategory = "";
    return;
  }

  detectedCategory = "";
  for (const [cat, keywords] of Object.entries(categoryMap)) {
    if (keywords.some(k => val.includes(k) || k.includes(val))) {
      detectedCategory = cat;
      break;
    }
  }

  if (detectedCategory) {
    suggest.textContent = categoryIcons[detectedCategory] + " " + detectedCategory;
    suggest.style.display = "block";
  } else {
    suggest.style.display = "none";
  }
}

function resolveCategory() {
  const manual = document.getElementById("catSelect").value;
  if (manual) return manual;
  return detectedCategory || "Other";
}

// ===================== API CALLS =====================
async function apiCall(payload) {
  if (!SCRIPT_URL) {
    showToast("⚠ Set your Script URL first (tap ⚙ Setup)");
    return null;
  }
  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(payload),
    });
    return await res.json();
  } catch (e) {
    showToast("Connection error — check your Script URL");
    return null;
  }
}

async function fetchItems() {
  if (!SCRIPT_URL) {
    renderList([]);
    document.getElementById("itemCount").textContent = "Configure your script URL to get started";
    return;
  }
  try {
    const res = await fetch(`${SCRIPT_URL}?action=getItems`);
    const data = await res.json();
    if (data.success) renderList(data.items);
  } catch (e) {
    showToast("Could not load list");
  }
}

async function addItem() {
  const input = document.getElementById("itemInput");
  const name = input.value.trim();
  if (!name) return;

  const category = resolveCategory();
  const btn = document.getElementById("addBtn");
  btn.disabled = true;
  btn.textContent = "Adding...";

  const data = await apiCall({ action: "addItem", name, category });
  if (data && data.success) {
    input.value = "";
    document.getElementById("catSuggest").style.display = "none";
    document.getElementById("catSelect").value = "";
    detectedCategory = "";
    renderList(data.items);
    showToast("Added to list");
  }

  btn.disabled = false;
  btn.textContent = "Add";
  input.focus();
}

async function toggleCheck(row, checked) {
  const data = await apiCall({ action: "updateChecked", row, checked });
  if (data && data.success) renderList(data.items);
}

async function deleteItem(row) {
  if (!confirm("Remove this item?")) return;
  const data = await apiCall({ action: "deleteItem", row });
  if (data && data.success) {
    renderList(data.items);
    showToast("Item removed");
  }
}

async function completeTrip() {
  const checkedCount = document.querySelectorAll(".item-row.checked").length;
  if (checkedCount === 0) { showToast("Check off items first"); return; }
  if (!confirm(`Mark ${checkedCount} item(s) as done and clear them?`)) return;

  const data = await apiCall({ action: "completeTrip" });
  if (data && data.success) {
    renderList(data.items);
    showToast("🎉 Shopping trip complete!");
  }
}

// ===================== RENDER =====================
function renderList(items) {
  const container = document.getElementById("listContainer");
  const countEl   = document.getElementById("itemCount");
  const completeBtn = document.getElementById("completeBtn");

  if (!items || items.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🛒</div>
        <p>Your list is empty</p>
        <span>Start adding items above</span>
      </div>`;
    countEl.innerHTML = "No items yet";
    completeBtn.classList.remove("visible");
    return;
  }

  // Group by category
  const groups = {};
  items.forEach(item => {
    const cat = item.category || "Other";
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(item);
  });

  // Sort categories by defined order
  const sortedCats = categoryOrder.filter(c => groups[c])
    .concat(Object.keys(groups).filter(c => !categoryOrder.includes(c)));

  let html = "";
  sortedCats.forEach(cat => {
    const catItems = groups[cat];
    const icon = categoryIcons[cat] || "📦";
    const allChecked = catItems.every(i => i.checked);
    html += `
      <div class="category-group">
        <div class="category-header">
          <span class="category-icon">${icon}</span>
          <span class="category-name">${cat}</span>
          <span class="category-count">${catItems.length}</span>
        </div>`;
    catItems.forEach(item => {
      html += `
        <div class="item-row ${item.checked ? "checked" : ""}" id="row-${item.row}">
          <div class="check-wrap">
            <input type="checkbox" ${item.checked ? "checked" : ""}
              onchange="toggleCheck(${item.row}, this.checked)" />
          </div>
          <span class="item-name">${escapeHtml(item.name)}</span>
          <button class="delete-btn" onclick="deleteItem(${item.row})" title="Remove">✕</button>
        </div>`;
    });
    html += `</div>`;
  });

  container.innerHTML = html;

  const total    = items.length;
  const checked  = items.filter(i => i.checked).length;
  const unchecked = total - checked;

  countEl.innerHTML = `<strong>${unchecked}</strong> item${unchecked !== 1 ? "s" : ""} remaining${checked > 0 ? ` · ${checked} checked` : ""}`;

  if (checked > 0) {
    completeBtn.classList.add("visible");
  } else {
    completeBtn.classList.remove("visible");
  }
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ===================== TOAST =====================
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2500);
}

// ===================== CONFIG =====================
function openConfig() {
  document.getElementById("scriptUrlInput").value = SCRIPT_URL;
  document.getElementById("configOverlay").classList.add("show");
}

function closeConfig() {
  document.getElementById("configOverlay").classList.remove("show");
}

function saveConfig() {
  const val = document.getElementById("scriptUrlInput").value.trim();
  if (!val) { showToast("Please enter a URL"); return; }
  SCRIPT_URL = val;
  localStorage.setItem("shoppingScriptUrl", val);
  closeConfig();
  showToast("Connected! Loading list...");
  fetchItems();
}

// ===================== INIT =====================
if (!SCRIPT_URL) {
  setTimeout(() => openConfig(), 600);
}
fetchItems();
</script>
